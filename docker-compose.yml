services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mailsentry-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mailsentry-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mailsentry-ui
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mailsentry-net
    security_opt:
      - no-new-privileges:true
    read_only: true

volumes:
  backend-data:
    driver: local

networks:
  mailsentry-net:
    driver: bridge
